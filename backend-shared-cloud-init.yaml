#cloud-config
package_update: true
packages:
  - python3
  - python3-pip
  - openssl
runcmd:
  - pip3 install flask
  - mkdir -p /opt/backend
  - openssl req -x509 -nodes -newkey rsa:2048 -keyout /etc/ssl/backend.key -out /etc/ssl/backend.crt -subj "/CN=mlz-dev-va-sharedServices-backend" -days 365
  - bash -c 'cat > /opt/backend/app.py <<"EOF"\nfrom flask import Flask\napp = Flask(__name__)\n@app.route("/healthz")\ndef healthz():\n    return "ok-shared", 200\n@app.route("/")\ndef root():\n    return "shared-backend", 200\nif __name__ == "__main__":\n    app.run(host="0.0.0.0", port=443, ssl_context=("/etc/ssl/backend.crt", "/etc/ssl/backend.key"))\nEOF'
  - bash -c 'cat > /etc/systemd/system/backend.service <<"EOF"\n[Unit]\nDescription=Shared Services Backend Flask Service\nAfter=network.target\n[Service]\nUser=root\nWorkingDirectory=/opt/backend\nExecStart=/usr/bin/python3 /opt/backend/app.py\nRestart=always\n[Install]\nWantedBy=multi-user.target\nEOF'
  - systemctl daemon-reload
  - systemctl enable backend.service
  - systemctl start backend.service
